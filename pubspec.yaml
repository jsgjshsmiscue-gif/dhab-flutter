name: dhab
description: DHAB - Premium Ride Hailing Platform by Mater Electric Cars
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2
  get_it: ^7.6.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  flutter_riverpod: ^2.4.1
  riverpod_annotation: ^2.3.3

  firebase_core: ^2.24.1
  firebase_auth: ^4.17.1
  cloud_firestore: ^4.14.1
  firebase_storage: ^11.6.1
  firebase_messaging: ^14.7.1
  firebase_analytics: ^10.7.1

  intl: ^0.20.2

  dio: ^5.3.1
  retrofit: ^4.1.0
  json_serializable: ^6.7.1

  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0

  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.2.0

  uuid: ^4.0.0
  image_picker: ^1.0.7
  permission_handler: ^11.4.4

  otp_text_field: ^1.1.3
  qr_flutter: ^4.1.0
  mixpanel_flutter: ^2.3.0
  shared_preferences: ^2.2.2
  go_router: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.0.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/flags/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500

    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
